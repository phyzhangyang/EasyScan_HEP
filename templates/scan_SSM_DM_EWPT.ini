[scan]
Result folder name:  SSM_DM_EWPT_grid
Scan method:       GRID
Input parameters:  mS,     flat,   70,       100,  10
                   lambdaHS,     flat,   0.005,       0.40,  10
Interval of print: 10
Parallel threads:  2
Parallel folder:   utils/SSM_DM_EWPT
[program1]
Program name:    micrOMEGAs_SingletDM
Execute command: ./main data1.par > easyscan_micromegas.out
Command path:    utils/SSM_DM_EWPT/programs/micromegas_7.1/SingletDM/
Input file:  1, utils/SSM_DM_EWPT/programs/micromegas_7.1/SingletDM/data1.par
Input variable:  mS,       1,       Label,       Mdm1,       2
                 lambdaHS,       1,       Label,       laSH,       2
Output file:  1, utils/SSM_DM_EWPT/programs/micromegas_7.1/SingletDM/easyscan_micromegas.out
Output variable:  Omega_h2,       1,       Label,       ES_Omega_h2,       2
                 sigmaSIp_pb,       1,       Label,       ES_sigmaSIp_pb,       2
[program2]
Program name:    PhaseTracer_xSM_TC
Execute command: ./bin/run_xSM_MSbar $(cat easyscan_phasetracer.in)
Command path:    utils/SSM_DM_EWPT/programs/PhaseTracer/
Input file:  1, utils/SSM_DM_EWPT/programs/PhaseTracer/easyscan_phasetracer.in
Input variable:  mS,       1,       Position,       1,       1
                 2*lambdaHS,       1,       Position,       1,       3
Output file:  1, utils/SSM_DM_EWPT/programs/PhaseTracer/output.txt
Output variable:  n_transitions,       1,       Position,       1,       4
                 Tc,       1,       Position,       1,       5
                 true_h_Tc,       1,       Position,       1,       6
                 true_s_Tc,       1,       Position,       1,       7
                 false_h_Tc,       1,       Position,       1,       8
                 false_s_Tc,       1,       Position,       1,       9
[plot]
Color:  mS,       lambdaHS,       Omega_h2,       SSM_Omega_h2
        mS,       lambdaHS,       sigmaSIp_pb,       SSM_sigmaSIp_pb
        mS,       lambdaHS,       Tc,       SSM_Tc
